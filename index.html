<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth</title>

<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 0;
    font-family: 'Minecraft', sans-serif;
    text-align: center;
    color: white;
    background: url("https://i.giphy.com/media/IrGdEDZsaH3Pi/giphy.gif") no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    pointer-events: none;
}

.container {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 500px;
}

.top-gif {
    width: 180px;
    margin-bottom: 25px;
}

.title {
    font-size: 70px;
    white-space: nowrap;
    overflow: hidden;
    border-right: 4px solid white;
    width: 5ch;
    margin: auto;
    animation: typingTitle 3s steps(5, end) forwards, blink 1s infinite;
}

.bio {
    font-size: 34px;
    margin-top: 30px;
    min-height: 50px;
    border-right: 3px solid white;
    display: inline-block;
}

.links {
    margin-top: 45px;
}

.links a {
    display: block;
    width: 100%;
    padding: 16px 0;
    font-size: 24px;
    margin: 18px 0;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.links a:hover { color: #00ffff; }
.links a:active { transform: scale(0.95); }

.test-note {
    margin-top: 30px;
    font-size: 18px;
    opacity: 0.7;
}

@keyframes typingTitle {
    from { width: 0 }
    to { width: 5ch; }
}

@keyframes blink {
    50% { border-color: transparent; }
}
</style>
</head>

<body>

<div class="container">

<img class="top-gif"
src="https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUybHdpNG0zMnJzOXhhMTdsZWR6Mm5xdHNnaTFyNGlrcTV6NmoxbnRxOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/bVF05HHaJyOzlGIaDJ/giphy.gif">

<div class="title">Earth</div>
<div class="bio" id="typing-text"></div>

<div class="links">
<a href="https://www.instagram.com/red_faza?igsh=aWp5MGxmaW9zZjll">(Instagram)</a>
<a href="https://www.tiktok.com/@eight157?_r=1&_t=ZS-94P8q0zfyVD">(TikTok)</a>
<a href="https://www.facebook.com/share/18EH759uXX/">(Facebook)</a>
<a href="https://discord.gg/6Gx933Cv9m">(Discord)</a>
</div>

<div class="test-note">(นี่เป็นเพียงแค่การเทสระบบของผมเท่านั้น)</div>

</div>

<script>
const texts = [
    "Hello, my name is Earth, I'm 18 years old and from Thailand.",
    "สวัสดี ผมชื่อเอิร์ธ อายุ 18 ปี มาจากประเทศไทย ยินดีที่ได้รู้จักนะครับ"
];

const typingElement = document.getElementById("typing-text");

let textIndex = 0;
let charIndex = 0;
let isDeleting = false;

function typeEffect() {
    const currentText = texts[textIndex];

    if (!isDeleting) {
        typingElement.textContent = currentText.substring(0, charIndex + 1);
        charIndex++;

        if (charIndex === currentText.length) {
            setTimeout(() => isDeleting = true, 1500);
        }
    } else {
        typingElement.textContent = currentText.substring(0, charIndex - 1);
        charIndex--;

        if (charIndex === 0) {
            isDeleting = false;
            textIndex = (textIndex + 1) % texts.length;
        }
    }

    setTimeout(typeEffect, isDeleting ? 40 : 80);
}

typeEffect();
</script>

</body>
</html>
